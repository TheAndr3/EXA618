<!DOCTYPE html>
<html>
<head>
    <title>Meu Blog</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
    </style>
</head>
<body>
    <h1>Novo Post do Blog</h1>
    
    <form method="POST" action="/cgi-bin/blog.py">
        Nome: <br>
        <input type="text" name="autor" required><br><br>
        
        Mensagem: <br>
        <textarea name="mensagem" rows="4" cols="50" required></textarea><br><br>
        
        <input type="submit" value="Enviar Postagem">
    </form>

    <form method="GET" action="/cgi-bin/list_posts.py">
        <input type="submit" value="Ver Postagens">
    </form>
    
</body>
</html>
